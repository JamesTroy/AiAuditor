version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # CLOUD-024: Removed blanket major version ignore.
    # Major version updates (including security patches that require breaking changes)
    # are now surfaced by Dependabot. Review and merge on a case-by-case basis.
    labels:
      - "dependencies"
