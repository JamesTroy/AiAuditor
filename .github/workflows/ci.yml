name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CLOUD-025: Explicit least-privilege permissions.
permissions:
  contents: read

jobs:
  build:
    name: Type check & build
    runs-on: ubuntu-latest
    steps:
      # CLOUD-026: Pin actions to full commit SHAs to prevent tag manipulation attacks.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      # CLOUD-012: Secret scanning gate — block commits containing real API keys.
      - name: Secret scanning
        uses: trufflesecurity/trufflehog@6f37e32a01fa8a5c9de9e1eaf72f0bedf2c270e1 # v3.88.26
        with:
          extra_args: --only-verified

      # CLOUD-027: Catch moderate-severity vulnerabilities (SSRF, info disclosure, ReDoS).
      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      # CLOUD-009: Validate that .env.example BETTER_AUTH_SECRET placeholder meets minimum length.
      - name: Validate secret configuration
        run: |
          SECRET=$(grep '^BETTER_AUTH_SECRET=' .env.example | cut -d= -f2)
          # Allow empty placeholder (production uses a real secret), but if set, must be 32+
          if [ -n "$SECRET" ] && [ ${#SECRET} -lt 32 ]; then
            echo "ERROR: BETTER_AUTH_SECRET example value is too short (must be 32+ chars)"
            exit 1
          fi
          echo "PASS: BETTER_AUTH_SECRET configuration is valid."

      # ARCH-025: Assert production CSP does not contain 'unsafe-eval'.
      # CSP is generated in middleware.ts (VULN-007 nonce-based policy); the
      # 'unsafe-eval' directive must only appear inside the isDev guard.
      - name: Assert prod CSP lacks unsafe-eval
        run: |
          node -e "
            const src = require('fs').readFileSync('middleware.ts', 'utf8');
            // 'unsafe-eval' must only appear inside an isDev conditional spread.
            // A bare occurrence (outside the spread) would mean it applies in prod.
            const bareEval = src.match(/'unsafe-eval'(?![^\n]*isDev)/);
            // The only allowed occurrence is:  ...(isDev ? [\"'unsafe-eval'\"] : [])
            // Check that every unsafe-eval line references isDev on the same line.
            const lines = src.split('\n').filter(l => l.includes(\"'unsafe-eval'\"));
            const unguarded = lines.filter(l => !l.includes('isDev'));
            if (unguarded.length > 0) {
              console.error('ERROR: unsafe-eval found outside isDev guard in middleware.ts:');
              unguarded.forEach(l => console.error(' ', l.trim()));
              process.exit(1);
            }
            console.log('PASS: unsafe-eval is guarded to dev-only in middleware.ts.');
          "

      - name: Build
        run: npm run build
        env:
          ANTHROPIC_API_KEY: dummy_key_for_build
