name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Type check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      # ARCH-025: Assert production CSP does not contain 'unsafe-eval'.
      # CSP is generated in middleware.ts (VULN-007 nonce-based policy); the
      # 'unsafe-eval' directive must only appear inside the isDev guard.
      - name: Assert prod CSP lacks unsafe-eval
        run: |
          node -e "
            const src = require('fs').readFileSync('middleware.ts', 'utf8');
            // 'unsafe-eval' must only appear inside an isDev conditional spread.
            // A bare occurrence (outside the spread) would mean it applies in prod.
            const bareEval = src.match(/'unsafe-eval'(?![^\n]*isDev)/);
            // The only allowed occurrence is:  ...(isDev ? [\"'unsafe-eval'\"] : [])
            // Check that every unsafe-eval line references isDev on the same line.
            const lines = src.split('\n').filter(l => l.includes(\"'unsafe-eval'\"));
            const unguarded = lines.filter(l => !l.includes('isDev'));
            if (unguarded.length > 0) {
              console.error('ERROR: unsafe-eval found outside isDev guard in middleware.ts:');
              unguarded.forEach(l => console.error(' ', l.trim()));
              process.exit(1);
            }
            console.log('PASS: unsafe-eval is guarded to dev-only in middleware.ts.');
          "

      - name: Build
        run: npm run build
        env:
          ANTHROPIC_API_KEY: dummy_key_for_build
