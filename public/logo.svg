<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="g2" x1="180" y1="160" x2="340" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Outer C arc — the lens / scanner rim -->
  <path
    d="M 390 148
       A 176 176 0 1 0 390 364"
    stroke="url(#g1)"
    stroke-width="52"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Scan beam — the gap in the C, a subtle line extending out -->
  <line
    x1="390" y1="148"
    x2="440" y2="108"
    stroke="#8b5cf6"
    stroke-width="28"
    stroke-linecap="round"
    opacity="0.5"
  />
  <line
    x1="390" y1="364"
    x2="440" y2="404"
    stroke="#6366f1"
    stroke-width="28"
    stroke-linecap="round"
    opacity="0.5"
  />

  <!-- Checkmark inside the C — the audit verdict -->
  <polyline
    points="190,264 238,312 330,208"
    stroke="url(#g2)"
    stroke-width="44"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
